<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis materiales de estudio</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-card-hover: #1c2230;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-soft: #1f3658;
    --tag-bg: #21262d;
    --tag-text: #8b949e;
    --success: #3fb950;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
  }

  header {
    max-width: 860px;
    margin: 0 auto 2.5rem;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.35rem;
  }

  header p {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    margin-right: 6px;
    vertical-align: middle;
  }

  #status {
    max-width: 860px;
    margin: 0 auto 1.5rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .grid {
    max-width: 860px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.35rem;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    cursor: pointer;
  }

  .card:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card-icon {
    font-size: 1.4rem;
    margin-bottom: 0.2rem;
  }

  .card-title {
    font-size: 0.97rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .card-meta {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    margin-top: 0.2rem;
    width: fit-content;
  }

  .arrow {
    margin-top: auto;
    font-size: 0.82rem;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .card:hover .arrow {
    opacity: 1;
  }

  .empty {
    max-width: 860px;
    margin: 0 auto;
    color: var(--text-secondary);
    font-size: 0.9rem;
    padding: 2rem 0;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    max-width: 860px;
    margin: 3rem auto 0;
    font-size: 0.78rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
  }
</style>
</head>
<body>

<header>
  <h1>📚 Mis materiales de estudio</h1>
  <p>Todos los archivos se cargan automáticamente desde GitHub. Solo sube un nuevo HTML y aparece aquí.</p>
</header>

<div id="status">
  <span class="spinner"></span>
  <span>Cargando archivos...</span>
</div>

<div class="grid" id="grid"></div>

<footer>
  Actualizado automáticamente desde <strong>GitHub</strong> · Solo tienes que subir el archivo.
</footer>

<script>
  const REPO_OWNER = 'diegohidalgosandoval';
  const REPO_NAME  = 'Estudio-de-Fundamentos-de-Programaci-n';
  const BASE_URL   = `https://diegohidalgosandoval.github.io/${REPO_NAME}/`;
  const API_URL    = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;

  function formatName(filename) {
    return filename
      .replace(/\.html$/i, '')
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function getIcon(name) {
    const n = name.toLowerCase();
    if (n.includes('micro') || n.includes('economia') || n.includes('finanz')) return '📈';
    if (n.includes('calc') || n.includes('mate') || n.includes('integral')) return '∫';
    if (n.includes('prog') || n.includes('codigo') || n.includes('fundamento')) return '💻';
    if (n.includes('bio') || n.includes('celula')) return '🧬';
    if (n.includes('hist')) return '📜';
    if (n.includes('estadistica') || n.includes('stat')) return '📊';
    if (n.includes('admin') || n.includes('estrategia')) return '🏢';
    if (n.includes('teologia') || n.includes('teolog')) return '✝️';
    if (n.includes('contab') || n.includes('costo')) return '📒';
    return '📄';
  }

  function getTag(name) {
    const n = name.toLowerCase();
    if (n.includes('cap') || n.includes('modulo') || n.includes('mod')) {
      const match = n.match(/(cap|modulo|mod)[_\-]?(\d+)/);
      return match ? `Módulo ${match[2]}` : 'Módulo';
    }
    if (n.includes('ejercicio') || n.includes('practica')) return 'Ejercicios';
    if (n.includes('resumen')) return 'Resumen';
    return 'Material';
  }

  async function loadFiles() {
    const statusEl = document.getElementById('status');
    const gridEl   = document.getElementById('grid');

    try {
      const res  = await fetch(API_URL);
      const data = await res.json();

      const htmlFiles = data.filter(f =>
        f.type === 'file' &&
        f.name.endsWith('.html') &&
        f.name !== 'index.html'
      );

      statusEl.innerHTML = htmlFiles.length > 0
        ? `<span class="dot"></span><span>${htmlFiles.length} archivo${htmlFiles.length > 1 ? 's' : ''} disponible${htmlFiles.length > 1 ? 's' : ''}</span>`
        : '';

      if (htmlFiles.length === 0) {
        gridEl.innerHTML = '<p class="empty">No se encontraron archivos HTML todavía. Sube tu primer material desde GitHub.</p>';
        return;
      }

      gridEl.innerHTML = htmlFiles.map(f => {
        const title = formatName(f.name);
        const icon  = getIcon(f.name);
        const tag   = getTag(f.name);
        const url   = BASE_URL + f.name;
        return `
          <a class="card" href="${url}" target="_blank">
            <div class="card-icon">${icon}</div>
            <div class="card-title">${title}</div>
            <span class="tag">${tag}</span>
            <div class="arrow">Abrir →</div>
          </a>`;
      }).join('');

    } catch (err) {
      statusEl.innerHTML = '⚠️ No se pudo conectar con GitHub. Revisa tu conexión.';
      console.error(err);
    }
  }

  loadFiles();
</script>

</body>
</html>
